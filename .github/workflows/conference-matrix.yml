name: Conference Matrix Processing

on:
  workflow_dispatch:
    inputs:
      start_dates:
        description: "List of start dates (one per line)"
        required: true
        type: string
      end_dates:
        description: "List of end dates (one per line), blank = same as start date"
        required: false
        type: string
        default: ""
      locations:
        description: "List of locations (one per line)"
        required: true
        type: string
      prices:
        description: "List of prices (one per line), blank = 0"
        required: false
        type: string
        default: ""

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      - name: Process Inputs
        id: set-matrix
        run: |
          # Create input files from multiline inputs
          echo "${{ inputs.start_dates }}" > start_dates.txt
          echo "${{ inputs.end_dates }}" > end_dates.txt
          echo "${{ inputs.locations }}" > locations.txt
          echo "${{ inputs.prices }}" > prices.txt

          # Run processor script
          matrix=$(bun run .github/scripts/process-conferences.ts)

          # Set output while escaping newlines and quotes
          matrix="${matrix//'%'/'%25'}"
          matrix="${matrix//$'\n'/'%0A'}"
          matrix="${matrix//$'\r'/'%0D'}"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  process:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      # Prevent all jobs from failing if one fails
      fail-fast: false
      # Allow multiple jobs to run in parallel
      max-parallel: 10

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      - name: Process Conference
        env:
          START_DATE: ${{ matrix.startDate }}
          END_DATE: ${{ matrix.endDate }}
          LOCATION: ${{ matrix.location }}
          PRICE: ${{ matrix.price }}
        run: |
          echo "Processing conference:"
          echo "Start Date: $START_DATE"
          echo "End Date: $END_DATE"
          echo "Location: $LOCATION"
          echo "Price: $PRICE"
          # Add your actual conference processing logic here
          bun run .github/scripts/process-conference.ts

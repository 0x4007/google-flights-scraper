name: Conference Matrix Processing

on:
  workflow_dispatch:
    inputs:
      start_dates:
        description: "List of start dates (one per line)"
        required: true
        type: string
      end_dates:
        description: "List of end dates (one per line), blank = same as start date"
        required: false
        type: string
        default: ""
      locations:
        description: "List of locations (one per line)"
        required: true
        type: string
      prices:
        description: "List of prices (one per line), blank = 0"
        required: false
        type: string
        default: ""

jobs:
  # First, restore data from cache
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      # Restore data cache if it exists
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v3
        with:
          path: data
          key: flight-data-${{ github.run_id }}
          restore-keys: |
            flight-data-

      # Create data directory if it doesn't exist
      - name: Ensure data directory exists
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: mkdir -p data

  setup:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      - name: Process Inputs
        id: set-matrix
        run: |
          # Create input files from multiline inputs
          echo "${{ inputs.start_dates }}" > start_dates.txt
          echo "${{ inputs.end_dates }}" > end_dates.txt
          echo "${{ inputs.locations }}" > locations.txt
          echo "${{ inputs.prices }}" > prices.txt

          # Run processor script
          matrix=$(bun run .github/scripts/process-conferences.ts)

          # Set output while escaping newlines and quotes
          matrix="${matrix//'%'/'%25'}"
          matrix="${matrix//$'\n'/'%0A'}"
          matrix="${matrix//$'\r'/'%0D'}"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  process:
    needs: [setup, prepare]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
      max-parallel: 10

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      # Restore data cache
      - name: Restore data cache
        uses: actions/cache@v3
        with:
          path: data
          key: flight-data-${{ github.run_id }}
          restore-keys: |
            flight-data-

      - name: Process Flight Data
        id: process-flight
        env:
          START_DATE: ${{ matrix.startDate }}
          END_DATE: ${{ matrix.endDate }}
          LOCATION: ${{ matrix.location }}
          PRICE: ${{ matrix.price }}
        run: |
          echo "Processing flight route:"
          echo "Start Date: $START_DATE"
          echo "End Date: $END_DATE"
          echo "Location: $LOCATION"
          echo "Price: $PRICE"

          # Process and output flight data
          FLIGHT_DATA=$(bun run .github/scripts/process-flight-data.ts)
          echo "flight_data=$FLIGHT_DATA" >> $GITHUB_OUTPUT

      - name: Store Flight Data
        env:
          FLIGHT_DATA: ${{ steps.process-flight.outputs.flight_data }}
        run: bun run scripts/store-flight-data.ts

  # Final job to save updated data cache
  save-data:
    needs: process
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Restore the final state of data
      - name: Restore final data cache
        uses: actions/cache@v3
        with:
          path: data
          key: flight-data-${{ github.run_id }}
          restore-keys: |
            flight-data-

      # Save data to artifacts for persistence
      - name: Upload data artifact
        uses: actions/upload-artifact@v3
        with:
          name: flight-data
          path: data/
          retention-days: 90

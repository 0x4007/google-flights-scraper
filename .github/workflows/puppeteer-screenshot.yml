name: Puppeteer Screenshot

on:
  # Run on every push to any branch
  push:
  # Run on pull requests to main
  pull_request:
    branches: [ main ]
  # Allow manual triggering with input parameters
  workflow_dispatch:
    inputs:
      from:
        description: 'Where from? (location)'
        required: true
        type: string
      to:
        description: 'Where to? (location)'
        required: true
        type: string
      departure:
        description: 'Departure date (YYYY-MM-DD)'
        required: true
        type: string
      return:
        description: 'Return date (YYYY-MM-DD)'
        required: false
        type: string
      include_budget:
        description: 'Include budget carriers'
        required: false
        type: boolean
        default: false

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Take screenshot
      run: >
        bun run src/index.ts
        --from "${{ github.event.inputs.from }}"
        --to "${{ github.event.inputs.to }}"
        --departure "${{ github.event.inputs.departure }}"
        ${{ github.event.inputs.return && format('--return "{0}"', github.event.inputs.return) }}
        ${{ github.event.inputs.include_budget == 'true' && '--include-budget' }}

    - name: Upload screenshot as artifact
      uses: actions/upload-artifact@v4
      with:
        name: flight-screenshots
        path: screenshot/*.png
        retention-days: 7

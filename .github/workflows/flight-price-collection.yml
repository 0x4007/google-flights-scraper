name: Flight Price Collection

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  collect-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Generate test dates
        run: bun run price:generate-dates

      - name: Collect flight prices
        run: bun run price:collect

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get today's date
          TODAY=$(date +%Y-%m-%d)

          # Create a new release
          gh release create data-${TODAY} \
            --title "Flight Data ${TODAY}" \
            --notes "Daily flight price collection data" \
            data/flights.json

      - name: Cleanup old data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run price:cleanup

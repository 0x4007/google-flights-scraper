name: Flight Scraper Tests

on:
  push:
    # branches: [ main ]
  pull_request:
    # branches: [ main ]
  workflow_dispatch:
    inputs:
      test_count:
        description: 'Number of random tests to run'
        required: false
        default: '3'
        type: number

jobs:
  test-matrix:
    name: Randomized Flight Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        test-set: [1, 2, 3]
        # Fail-fast is set to false to ensure all matrix jobs run even if one fails
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 libxdamage1 libxrandr2 libgbm1 libasound2 libpango-1.0-0 libpangocairo-1.0-0

      - name: Generate random test parameters
        id: generate-params
        run: |
          # Create a unique seed based on matrix value and time to ensure different params
          RANDOM_SEED=$(( ${{ matrix.test-set }} + $(date +%s) ))
          echo "Using random seed: $RANDOM_SEED"
          echo "RANDOM_SEED=$RANDOM_SEED" >> $GITHUB_ENV

          # Generate a random multiplier for more variation
          echo "MULTIPLIER=$(( $RANDOM_SEED % 10 + 1 ))" >> $GITHUB_ENV

      - name: Run flight search tests
        run: |
          # Use the random seed to get different parameters for each matrix job
          export RANDOM=$RANDOM_SEED

          # Determine how many tests to run in this job
          # Use GitHub workflow_dispatch input or default to 1 per matrix job
          TEST_COUNT=$(( ${{ github.event.inputs.test_count || 1 }} / 3 + ${{ env.MULTIPLIER }} % 3 ))
          if [ $TEST_COUNT -lt 1 ]; then TEST_COUNT=1; fi

          echo "Running $TEST_COUNT tests in this matrix job"

          # Run the test script
          bun scripts/run-random-tests.ts --count $TEST_COUNT

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-search-results-${{ matrix.test-set }}
          path: screenshot/
          retention-days: 7
          if-no-files-found: warn

  # Summary job that runs after all matrix jobs
  test-summary:
    name: Test Summary
    needs: test-matrix
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: flight-search-results-*
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "# Flight Scraper Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count total tests
          TOTAL_DIRS=$(find all-results -type d -name "test-*" | wc -l)
          echo "Total tests run: $TOTAL_DIRS" >> $GITHUB_STEP_SUMMARY

          # Count successful tests (where flight-data.json exists)
          SUCCESSFUL=$(find all-results -type f -name "flight-data.json" | wc -l)
          echo "Successful tests: $SUCCESSFUL" >> $GITHUB_STEP_SUMMARY

          # Count failed tests
          FAILED=$(find all-results -type f -name "error.txt" | wc -l)
          echo "Failed tests: $FAILED" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## City Pairs Tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Create a table of city pairs
          echo "| From | To | Date Range | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|-----------:|--------|" >> $GITHUB_STEP_SUMMARY

          # Loop through parameter files and extract data
          for PARAMS_FILE in $(find all-results -name "parameters.json"); do
            TEST_DIR=$(dirname "$PARAMS_FILE")
            FROM=$(jq -r '.from' "$PARAMS_FILE")
            TO=$(jq -r '.to' "$PARAMS_FILE")
            DEP=$(jq -r '.departureDate' "$PARAMS_FILE")
            RET=$(jq -r '.returnDate' "$PARAMS_FILE")

            if [ -f "$TEST_DIR/flight-data.json" ]; then
              STATUS="✅ Pass"
            else
              STATUS="❌ Fail"
            fi

            echo "| $FROM | $TO | $DEP to $RET | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done

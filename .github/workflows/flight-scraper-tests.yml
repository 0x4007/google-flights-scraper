name: Flight Scraper Random Tests

on:
  # Run on every push to any branch
  push:
  # Run on pull requests to main
  pull_request:
    branches: [main]
  # Allow manual triggering with input parameters
  workflow_dispatch:
    inputs:
      test_count:
        description: 'Number of random tests to run'
        required: false
        default: '3'
        type: number

jobs:
  random-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run random flight search tests
        run: |
          # Get the test count from input or use default
          TEST_COUNT=${{ github.event.inputs.test_count || 3 }}
          echo "Running $TEST_COUNT random flight search tests"

          # Run the test script
          bun scripts/run-random-tests.ts --count $TEST_COUNT

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-screenshots
          path: screenshot/**/*.png
          retention-days: 7

      - name: Upload flight data as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flight-data-results
          path: screenshot/**/flight-data.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test parameters as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-parameters
          path: screenshot/**/parameters.json
          retention-days: 7

      - name: Upload error logs (if any)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: error-logs
          path: screenshot/**/error.txt
          retention-days: 7
          if-no-files-found: ignore
